<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админ-панель — Ремонт</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        /* ===== ДОПОЛНИТЕЛЬНЫЕ СТИЛИ ДЛЯ АДМИНКИ ===== */
        .admin-wrap {
            background: #1a1a2e;
            padding: 30px 20px;
            min-height: 100vh;
        }
        .admin-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .admin-container h1 {
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .sub {
            color: #888;
            margin-bottom: 30px;
        }
        .block {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            border-left: 4px solid #e94560;
        }
        .block h2 {
            font-size: 18px;
            color: #1a1a2e;
            margin-bottom: 16px;
        }
        .field {
            margin-bottom: 14px;
        }
        .field label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #333;
            margin-bottom: 4px;
        }
        .field input,
        .field textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .field textarea {
            resize: vertical;
            min-height: 60px;
        }
        .btn-save {
            background: #1a1a2e;
            margin-top: 10px;
        }
        .btn-save:hover {
            background: #2a2a4e;
        }
        .btn-danger {
            background: #dc3545;
        }
        .btn-danger:hover {
            background: #b02a37;
        }
        .btn-sm {
            padding: 6px 16px;
            font-size: 13px;
        }
        .status {
            background: #d4edda;
            color: #155724;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .status.show {
            display: block;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        @media (max-width: 600px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
        .service-item,
        .price-item {
            background: white;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #e0e0e0;
            position: relative;
        }
        .service-item .remove-btn,
        .price-item .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
        }
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
        }
        .login-box h2 {
            margin-bottom: 20px;
            color: #1a1a2e;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 14px;
            font-size: 16px;
        }
        .login-box .error {
            color: #dc3545;
            font-size: 14px;
            margin-bottom: 10px;
            display: none;
        }
        .hidden {
            display: none;
        }
        .img-preview {
            max-width: 80px;
            max-height: 80px;
            border-radius: 8px;
            margin-top: 6px;
            border: 2px solid #ddd;
        }
        .file-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .file-input-wrapper input[type="file"] {
            flex: 1;
        }
        .admin-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<!-- ЛОГИН -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <h2>🔐 Вход в админ-панель</h2>
        <p style="color:#888; margin-bottom:16px;">Введите логин и пароль</p>
        <div class="error" id="loginError">Неверный логин или пароль</div>
        <input type="text" id="loginUser" placeholder="Логин" value="admin" />
        <input type="password" id="loginPass" placeholder="Пароль" value="remont2026" />
        <button class="btn" style="width:100%;" onclick="doLogin()">Войти</button>
    </div>
</div>

<!-- АДМИНКА -->
<div id="adminPanel" class="hidden">
    <div class="admin-wrap">
        <div class="admin-container">
            <div class="admin-top">
                <h1>🔧 Админ-панель</h1>
                <button class="btn btn-danger btn-sm" onclick="doLogout()">🚪 Выйти</button>
            </div>
            <p class="sub">Редактирование контента сайта «Ремонт квартир и офисов»</p>

            <div id="status" class="status">✅ Данные сохранены</div>

            <!-- ШАПКА -->
            <div class="block">
                <h2>📌 Шапка сайта</h2>
                <div class="field">
                    <label>Заголовок H1</label>
                    <input type="text" id="heroTitle" value="Ремонт квартир и офисов" />
                </div>
                <div class="field">
                    <label>Описание под заголовком</label>
                    <textarea id="heroDesc">Профессиональный подход, прозрачная смета и гарантия качества. Работаем в Москве и области.</textarea>
                </div>
                <div class="field">
                    <label>Текст на кнопке</label>
                    <input type="text" id="heroBtn" value="Получить бесплатную смету" />
                </div>
            </div>

            <!-- УСЛУГИ -->
            <div class="block">
                <h2>🛠️ Услуги</h2>
                <div id="servicesContainer"></div>
                <button class="btn btn-sm" onclick="addService()">➕ Добавить услугу</button>
            </div>

            <!-- ЦЕНЫ -->
            <div class="block">
                <h2>💰 Цены</h2>
                <div id="pricesContainer"></div>
                <button class="btn btn-sm" onclick="addPrice()">➕ Добавить цену</button>
            </div>

            <!-- КОНТАКТЫ -->
            <div class="block">
                <h2>📞 Контакты</h2>
                <div class="field">
                    <label>Телефон</label>
                    <input type="text" id="phone" value="+7 (999) 123-45-67" />
                </div>
                <div class="field">
                    <label>Название компании в подвале</label>
                    <input type="text" id="footerName" value="Ремонт-Про" />
                </div>
            </div>

            <button class="btn btn-save" onclick="saveAll()">💾 Сохранить все изменения</button>
        </div>
    </div>
</div>

<script src="admin.js"></script>
</body>
</html>
