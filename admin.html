<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админ-панель — Ремонт</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #1a1a2e; padding: 30px 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        h1 { color: #1a1a2e; margin-bottom: 8px; }
        .sub { color: #888; margin-bottom: 30px; }
        .block { background: #f8f8f8; border-radius: 12px; padding: 24px; margin-bottom: 24px; border-left: 4px solid #e94560; }
        .block h2 { font-size: 18px; color: #1a1a2e; margin-bottom: 16px; }
        .field { margin-bottom: 14px; }
        .field label { display: block; font-weight: 600; font-size: 14px; color: #333; margin-bottom: 4px; }
        .field input, .field textarea { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .field textarea { resize: vertical; min-height: 60px; }
        .btn { background: #e94560; color: white; border: none; padding: 12px 30px; border-radius: 50px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #c73652; }
        .btn-save { background: #1a1a2e; margin-top: 10px; }
        .btn-save:hover { background: #2a2a4e; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #b02a37; }
        .btn-sm { padding: 6px 16px; font-size: 13px; }
        .status { background: #d4edda; color: #155724; padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; display: none; }
        .status.show { display: block; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
        .service-item, .price-item { background: white; border-radius: 10px; padding: 16px; margin-bottom: 12px; border: 1px solid #e0e0e0; position: relative; }
        .service-item .remove-btn, .price-item .remove-btn { position: absolute; top: 10px; right: 10px; }
        .login-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 20px; max-width: 400px; width: 100%; }
        .login-box h2 { margin-bottom: 20px; color: #1a1a2e; }
        .login-box input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 14px; font-size: 16px; }
        .login-box .error { color: #dc3545; font-size: 14px; margin-bottom: 10px; display: none; }
        .hidden { display: none; }
        .img-preview { max-width: 80px; max-height: 80px; border-radius: 8px; margin-top: 6px; border: 2px solid #ddd; }
        .file-input-wrapper { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .file-input-wrapper input[type="file"] { flex: 1; }
    </style>
</head>
<body>

<!-- ЛОГИН -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <h2>🔐 Вход в админ-панель</h2>
        <p style="color:#888; margin-bottom:16px;">Введите логин и пароль</p>
        <div class="error" id="loginError">Неверный логин или пароль</div>
        <input type="text" id="loginUser" placeholder="Логин" value="admin" />
        <input type="password" id="loginPass" placeholder="Пароль" value="remont2026" />
        <button class="btn" style="width:100%;" onclick="doLogin()">Войти</button>
    </div>
</div>

<!-- АДМИНКА (скрыта до входа) -->
<div id="adminPanel" class="hidden">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:10px;">
            <h1>🔧 Админ-панель</h1>
            <button class="btn btn-danger btn-sm" onclick="doLogout()">🚪 Выйти</button>
        </div>
        <p class="sub">Редактирование контента сайта «Ремонт квартир и офисов»</p>

        <div id="status" class="status">✅ Данные сохранены</div>

        <!-- ШАПКА -->
        <div class="block">
            <h2>📌 Шапка сайта</h2>
            <div class="field">
                <label>Заголовок H1</label>
                <input type="text" id="heroTitle" value="Ремонт квартир и офисов" />
            </div>
            <div class="field">
                <label>Описание под заголовком</label>
                <textarea id="heroDesc">Профессиональный подход, прозрачная смета и гарантия качества. Работаем в Москве и области.</textarea>
            </div>
            <div class="field">
                <label>Текст на кнопке</label>
                <input type="text" id="heroBtn" value="Получить бесплатную смету" />
            </div>
        </div>

        <!-- УСЛУГИ -->
        <div class="block">
            <h2>🛠️ Услуги</h2>
            <div id="servicesContainer"></div>
            <button class="btn btn-sm" onclick="addService()">➕ Добавить услугу</button>
        </div>

        <!-- ЦЕНЫ -->
        <div class="block">
            <h2>💰 Цены</h2>
            <div id="pricesContainer"></div>
            <button class="btn btn-sm" onclick="addPrice()">➕ Добавить цену</button>
        </div>

        <!-- КОНТАКТЫ -->
        <div class="block">
            <h2>📞 Контакты</h2>
            <div class="field">
                <label>Телефон</label>
                <input type="text" id="phone" value="+7 (999) 123-45-67" />
            </div>
            <div class="field">
                <label>Название компании в подвале</label>
                <input type="text" id="footerName" value="Ремонт-Про" />
            </div>
        </div>

        <button class="btn btn-save" onclick="saveAll()">💾 Сохранить все изменения</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'remont_site_data';
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'remont2026';

    // ============= ЛОГИН =============
    function doLogin() {
        const user = document.getElementById('loginUser').value;
        const pass = document.getElementById('loginPass').value;
        const error = document.getElementById('loginError');
        if (user === ADMIN_USER && pass === ADMIN_PASS) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('adminPanel').classList.remove('hidden');
            loadData();
            error.style.display = 'none';
        } else {
            error.style.display = 'block';
        }
    }

    function doLogout() {
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('adminPanel').classList.add('hidden');
        document.getElementById('loginPass').value = '';
        document.getElementById('loginError').style.display = 'none';
    }

    // Нажатие Enter в полях логина
    document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    // ============= ДАННЫЕ ПО УМОЛЧАНИЮ =============
    const defaultServices = [
        { icon: '🏠', title: 'Косметический ремонт', desc: 'Обои, покраска, стяжка пола, замена розеток — быстро и аккуратно.', image: '' },
        { icon: '🏢', title: 'Капитальный ремонт', desc: 'Полная перепланировка, электрика, сантехника, отделка под ключ.', image: '' },
        { icon: '🏗️', title: 'Офисные помещения', desc: 'Ремонт коммерческих площадей с учётом всех норм и сроков.', image: '' },
        { icon: '🎨', title: 'Дизайн-проект', desc: 'Разработаем стильный интерьер под ваш бюджет и вкус.', image: '' }
    ];

    const defaultPrices = [
        { title: 'Косметический', cost: 'от 4 500 ₽/м²', desc: 'Обои + пол + потолок' },
        { title: 'Капитальный', cost: 'от 9 000 ₽/м²', desc: 'Под ключ с материалами' },
        { title: 'Офис', cost: 'договорная', desc: 'Зависит от объёма' }
    ];

    function getData() {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : null;
    }

    function setData(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // ============= ЗАГРУЗКА ДАННЫХ В АДМИНКУ =============
    function loadData() {
        const data = getData();
        const services = data?.services || defaultServices;
        const prices = data?.prices || defaultPrices;

        document.getElementById('heroTitle').value = data?.heroTitle || 'Ремонт квартир и офисов';
        document.getElementById('heroDesc').value = data?.heroDesc || 'Профессиональный подход, прозрачная смета и гарантия качества. Работаем в Москве и области.';
        document.getElementById('heroBtn').value = data?.heroBtn || 'Получить бесплатную смету';
        document.getElementById('phone').value = data?.phone || '+7 (999) 123-45-67';
        document.getElementById('footerName').value = data?.footerName || 'Ремонт-Про';

        renderServices(services);
        renderPrices(prices);
    }

    // ============= ОТРИСОВКА УСЛУГ =============
    function renderServices(services) {
        const container = document.getElementById('servicesContainer');
        container.innerHTML = '';
        services.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'service-item';
            div.innerHTML = `
                <button class="btn btn-danger btn-sm remove-btn" onclick="removeService(${i})">✕</button>
                <div class="grid-2">
                    <div class="field">
                        <label>Иконка (эмодзи)</label>
                        <input type="text" id="svc_icon_${i}" value="${s.icon || '🔧'}" />
                    </div>
                    <div class="field">
                        <label>Название</label>
                        <input type="text" id="svc_title_${i}" value="${s.title || ''}" />
                    </div>
                    <div class="field" style="grid-column:1/-1;">
                        <label>Описание</label>
                        <input type="text" id="svc_desc_${i}" value="${s.desc || ''}" />
                    </div>
                    <div class="field" style="grid-column:1/-1;">
                        <label>Изображение</label>
                        <div class="file-input-wrapper">
                            <input type="file" accept="image/*" onchange="previewImage(event, 'svc_img_${i}')" />
                            <button class="btn btn-sm btn-danger" onclick="removeImage('svc_img_${i}')">🗑️ Удалить</button>
                        </div>
                        <input type="hidden" id="svc_img_${i}" value="${s.image || ''}" />
                        <div id="svc_img_preview_${i}">${s.image ? `<img src="${s.image}" class="img-preview" />` : ''}</div>
                    </div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // ============= ОТРИСОВКА ЦЕН =============
    function renderPrices(prices) {
        const container = document.getElementById('pricesContainer');
        container.innerHTML = '';
        prices.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = 'price-item';
            div.innerHTML = `
                <button class="btn btn-danger btn-sm remove-btn" onclick="removePrice(${i})">✕</button>
                <div class="grid-2">
                    <div class="field"><label>Название</label><input type="text" id="prc_title_${i}" value="${p.title || ''}" /></div>
                    <div class="field"><label>Стоимость</label><input type="text" id="prc_cost_${i}" value="${p.cost || ''}" /></div>
                    <div class="field" style="grid-column:1/-1;"><label>Описание</label><input type="text" id="prc_desc_${i}" value="${p.desc || ''}" /></div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // ============= РАБОТА С ИЗОБРАЖЕНИЯМИ =============
    function previewImage(event, hiddenId) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById(hiddenId).value = e.target.result;
            const previewId = hiddenId.replace('svc_img_', 'svc_img_preview_');
            document.getElementById(previewId).innerHTML = `<img src="${e.target.result}" class="img-preview" />`;
        };
        reader.readAsDataURL(file);
    }

    function removeImage(hiddenId) {
        document.getElementById(hiddenId).value = '';
        const previewId = hiddenId.replace('svc_img_', 'svc_img_preview_');
        document.getElementById(previewId).innerHTML = '';
        // Очищаем input file
        const container = document.getElementById(previewId).closest('.field');
        const fileInput = container.querySelector('input[type="file"]');
        if (fileInput) fileInput.value = '';
    }

    // ============= ДОБАВЛЕНИЕ / УДАЛЕНИЕ =============
    function addService() {
        const data = getData() || { services: defaultServices, prices: defaultPrices };
        data.services.push({ icon: '🔧', title: 'Новая услуга', desc: 'Описание услуги', image: '' });
        setData(data);
        renderServices(data.services);
        showStatus();
    }

    function removeService(index) {
        const data = getData();
        if (!data) return;
        data.services.splice(index, 1);
        setData(data);
        renderServices(data.services);
        showStatus();
    }

    function addPrice() {
        const data = getData() || { services: defaultServices, prices: defaultPrices };
        data.prices.push({ title: 'Новая услуга', cost: '0 ₽', desc: 'Описание' });
        setData(data);
        renderPrices(data.prices);
        showStatus();
    }

    function removePrice(index) {
        const data = getData();
        if (!data) return;
        data.prices.splice(index, 1);
        setData(data);
        renderPrices(data.prices);
        showStatus();
    }

    // ============= СОХРАНЕНИЕ =============
    function saveAll() {
        const data = getData() || { services: [], prices: [] };

        // Сохраняем шапку
        data.heroTitle = document.getElementById('heroTitle').value;
        data.heroDesc = document.getElementById('heroDesc').value;
        data.heroBtn = document.getElementById('heroBtn').value;
        data.phone = document.getElementById('phone').value;
        data.footerName = document.getElementById('footerName').value;

        // Сохраняем услуги
        const services = [];
        const svcItems = document.querySelectorAll('.service-item');
        svcItems.forEach((item, i) => {
            const icon = document.getElementById(`svc_icon_${i}`);
            const title = document.getElementById(`svc_title_${i}`);
            const desc = document.getElementById(`svc_desc_${i}`);
            const image = document.getElementById(`svc_img_${i}`);
            if (icon && title && desc) {
                services.push({
                    icon: icon.value || '🔧',
                    title: title.value || 'Услуга',
                    desc: desc.value || '',
                    image: image ? image.value : ''
                });
            }
        });
        data.services = services;

        // Сохраняем цены
        const prices = [];
        const prcItems = document.querySelectorAll('.price-item');
        prcItems.forEach((item, i) => {
            const title = document.getElementById(`prc_title_${i}`);
            const cost = document.getElementById(`prc_cost_${i}`);
            const desc = document.getElementById(`prc_desc_${i}`);
            if (title && cost && desc) {
                prices.push({
                    title: title.value || 'Услуга',
                    cost: cost.value || '0 ₽',
                    desc: desc.value || ''
                });
            }
        });
        data.prices = prices;

        setData(data);
        showStatus();
    }

    function showStatus() {
        const status = document.getElementById('status');
        status.classList.add('show');
        setTimeout(() => status.classList.remove('show'), 3000);
    }

    // ============= ЗАПУСК =============
    // Если уже есть сессия (не выходили) — показываем админку
    // По умолчанию показываем логин
</script>

</body>
</html>
